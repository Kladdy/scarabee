# Edit data/endf8.py to customize the processing.
# Also, set 
#   base = "/nuclear_data/endf/ENDF-B-VIII.0/neutrons/"
#   tslbase = "/nuclear_data/endf/ENDF-B-VIII.0/thermal_scatt/"

# To run, install Docker and Docker Compose (or some alternative container runtime),
# then execute:
#   docker compose up --build -d
#   docker exec -it scarabee-ubuntu /bin/bash
# The first command takes a while to complete (in the order of tens of minutes)

# Once in the container, run:
#   cd /data
#   python3 endf8.py
# The second command takes a while to complete (in the order of days)

# If a crash occurs, it might be due to RAM limitations. 
# Try increasing the RAM available to container runtime.

services:
  ubuntu:
    build: .
    container_name: scarabee-ubuntu
    stdin_open: true
    tty: true
    volumes:
      - ../:/data:Z
