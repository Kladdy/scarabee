version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  apt_packages:
    - cmake
    - g++
    - libx11-dev
    - libxrandr-dev
    - libxinerama-dev
    - libxcursor-dev
    - libxi-dev
    - libomp-dev 
    - mesa-common-dev
    - libgl1-mesa-dev
    - libglu1-mesa-dev
    - libwayland-dev
    - libxkbcommon-dev
    - xorg-dev
  jobs:
    pre_build:
      - python -m pip install --no-cache-dir -v .

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - requirements: docs/requirements.txt
